    <style>
        :root {
            --primary: #2563eb;
            --bg-main: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --border-color: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg-main); color: var(--text-primary); line-height: 1.8; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; }
        .hero { text-align: center; padding: 100px 0 80px; background: linear-gradient(180deg, #f5e6d3 0%, var(--bg-main) 100%); }
        .gift-icon { width: 280px; height: 280px; margin: 0 auto 40px; position: relative; }
        .gift-box-body { width: 220px; height: 220px; background: #ffd700; border: 8px solid #3d4852; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: hidden; }
        .gift-box-present { width: 160px; height: 160px; background: repeating-linear-gradient(45deg, #ffd700, #ffd700 10px, #ffffff 10px, #ffffff 20px); border: 6px solid #3d4852; border-radius: 12px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .gift-ribbon-h { width: 100%; height: 40px; background: #ffd700; position: absolute; top: 50%; left: 0; transform: translateY(-50%); border-top: 4px solid #3d4852; border-bottom: 4px solid #3d4852; }
        .gift-ribbon-v { width: 40px; height: 100%; background: #ffd700; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-left: 4px solid #3d4852; border-right: 4px solid #3d4852; }
        .gift-bow { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .bow-left, .bow-right { width: 38px; height: 38px; background: #ffd700; border: 5px solid #3d4852; border-radius: 50%; }
        .bow-center { width: 22px; height: 22px; background: #ffd700; border: 4px solid #3d4852; }
        .hero h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 30px; color: #2d3748; }
        .cta-button { display: inline-block; padding: 22px 60px; background: linear-gradient(180deg, #ff6b35 0%, #ff4500 100%); color: #ffffff; text-decoration: none; font-size: 1.4rem; font-weight: 900; border-radius: 16px; border: 4px solid #3d4852; box-shadow: 0 8px 0 #3d4852; transition: 0.2s; }
        .cta-button:hover { transform: translateY(3px); box-shadow: 0 5px 0 #3d4852; }
        .section { padding: 60px 0; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; padding: 32px 28px; }
        .legal-section { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; padding: 40px; margin-top: 32px; }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <div class="gift-icon">
                <div class="gift-box-body"><div class="gift-box-present"><div class="gift-ribbon-h"></div><div class="gift-ribbon-v"></div></div></div>
                <div class="gift-bow"><div class="bow-left"></div><div class="bow-center"></div><div class="bow-right"></div></div>
            </div>
            <h1>プレゼント公式</h1>
            <p>公式ラインを追加して賞品をゲットしよう!</p>
            <br>
            <a href="https://lin.ee/EJytMxi" class="cta-button" onclick="ttq.track('ClickButton')">今すぐ受け取る</a>
        </section>

        <section class="section">
            <div class="card-grid">
                <div class="card"><h3>💰 広告収入の還元</h3><p>広告収入の一部を賞品資金として活用しています。</p></div>
                <div class="card"><h3>🤝 協賛企業からの支援</h3><p>製品を特別価格で提供してくださっています。</p></div>
                <div class="card"><h3>❤️ 社会貢献の一環</h3><p>利益を還元し、皆さまに幸せをお届けします。</p></div>
            </div>
            <div class="legal-section">
                <h2>【特定商取引法に基づく表記】</h2>
                <p>・事業者名: 株式会社GIFT</p>
                <p>・所在地: 〒141-0022 東京都品川区東五反田2-5-2</p>
            </div>
        </section>
    </div>
</body>
</html>
